<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EnvíaTrack - Administración</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .btn-volver {
            background-color: #3498db;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn-volver:hover {
            background-color: #2980b9;
        }
        .tabla-mensajeros {
            margin-top: 20px;
            overflow-x: auto;
        }
        .form-mensajero {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .form-mensajero input {
            padding: 8px;
            margin-right: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .btn-agregar {
            background-color: #27ae60;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-editar {
            background-color: #f39c12;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 5px;
        }
        .btn-eliminar {
            background-color: #e74c3c;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .asignacion {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .asignacion select, .asignacion button {
            padding: 8px;
            margin-right: 10px;
        }
        .mensajero-activo {
            background-color: #e8f5e9;
        }
        h2 {
            margin-bottom: 15px;
            color: #333;
        }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    
    <div class="admin-header">
        <h1>👑 EnvíaTrack - Administración</h1>
        <a href="index.html" class="btn-volver">← Volver al Panel de Envíos</a>
    </div>

    <!-- Gestión de Mensajeros -->
    <div class="form-mensajero">
        <h2>👤 Gestión de Mensajeros</h2>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <input type="text" id="codigo-mensajero" placeholder="Código (ej: MEN004)" style="flex: 1;">
            <input type="text" id="nombre-mensajero" placeholder="Nombre completo" style="flex: 2;">
            <input type="text" id="telefono-mensajero" placeholder="Teléfono" style="flex: 1;">
            <button id="btn-agregar-mensajero" class="btn-agregar">➕ Agregar Mensajero</button>
        </div>
    </div>

    <!-- Lista de Mensajeros -->
    <div class="tabla-mensajeros">
        <h2>📋 Lista de Mensajeros</h2>
        <div id="tabla-mensajeros"></div>
    </div>

    <!-- Asignar Mensajero a Envío -->
    <div class="asignacion">
        <h2>📦 Asignar Mensajero a Envío</h2>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
            <select id="select-envio" style="flex: 2; padding: 8px;">
                <option value="">Seleccionar envío...</option>
            </select>
            <select id="select-mensajero" style="flex: 2; padding: 8px;">
                <option value="">Seleccionar mensajero...</option>
            </select>
            <button id="btn-asignar" class="btn-agregar">📌 Asignar</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="admin.js"></script>
</body>
</html>
